image:
  repository: quay.io/rhpds/athena-aiops
  tag: latest
  pullPolicy: Always

aap2:
  url: ""
  username: ""
  password: ""
  organization: ""

kira:
  url: ""
  apiKey: ""
  frontendUrl: ""  # External URL for ticket links in notifications

rocketchat:
  url: ""
  apiAuthToken: ""
  apiUserId: ""
  channel: "support"

# MaaS (LLM gateway) — uses litellm_* env var names per provisioning system
maas:
  apiBaseUrl: ""
  virtualKey: ""

tavily:
  apiKey: ""

service:
  port: 8080
  type: ClusterIP

route:
  enabled: true

agentConfig:
  opsManagerModel: "openai/claude-sonnet-4-6"
  specialistModel: "openai/claude-sonnet-4-6"
  reviewerModel: "openai/claude-3-5-haiku"
  # AGENTS.md and subagents.yaml content for the athena-agent-config ConfigMap.
  # The deployer role provides these from the cloned repo.
  # For manual helm install: --set-file agentConfig.agentsMd=./AGENTS.md
  agentsMd: ""
  subagentsYaml: ""

skills:
  persistence:
    enabled: true
    size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
