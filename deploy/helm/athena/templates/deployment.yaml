apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "athena.fullname" . }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "athena.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "athena.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.skills.persistence.enabled }}
      initContainers:
        - name: init-skills
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          command: ["sh", "-c"]
          args:
            - |
              if [ -z "$(ls /mnt/skills 2>/dev/null | grep -v lost+found)" ]; then
                cp -r /app/skills-default/* /mnt/skills/
                chown -R 1001:0 /mnt/skills/
                echo "Skills initialized from image defaults"
              else
                echo "Skills PVC already populated, skipping"
              fi
          volumeMounts:
            - name: skills
              mountPath: /mnt/skills
      {{- end }}
      containers:
        - name: athena
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # AAP2
            - name: AAP2_URL
              value: {{ .Values.aap2.url | quote }}
            - name: AAP2_USERNAME
              value: {{ .Values.aap2.username | quote }}
            - name: AAP2_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena.fullname" . }}
                  key: aap2-password
            - name: AAP2_ORGANIZATION
              value: {{ .Values.aap2.organization | quote }}
            # Kira
            - name: KIRA_URL
              value: {{ .Values.kira.url | quote }}
            - name: KIRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena.fullname" . }}
                  key: kira-api-key
            {{- if .Values.kira.frontendUrl }}
            - name: KIRA_FRONTEND_URL
              value: {{ .Values.kira.frontendUrl | quote }}
            {{- end }}
            # Rocket.Chat
            - name: ROCKETCHAT_URL
              value: {{ .Values.rocketchat.url | quote }}
            - name: ROCKETCHAT_API_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena.fullname" . }}
                  key: rocketchat-auth-token
            - name: ROCKETCHAT_API_USER_ID
              value: {{ .Values.rocketchat.apiUserId | quote }}
            - name: ROCKETCHAT_CHANNEL
              value: {{ .Values.rocketchat.channel | quote }}
            # Agent models
            - name: OPS_MANAGER_MODEL
              value: {{ .Values.agentConfig.opsManagerModel | quote }}
            # MaaS (LLM gateway)
            - name: LITELLM_API_BASE_URL
              value: {{ .Values.maas.apiBaseUrl | quote }}
            - name: LITELLM_VIRTUAL_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena.fullname" . }}
                  key: maas-virtual-key
            {{- if .Values.tavily.apiKey }}
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena.fullname" . }}
                  key: tavily-api-key
            {{- end }}
            {{- if .Values.athena }}
            {{- if .Values.athena.baseUrl }}
            - name: ATHENA_BASE_URL
              value: {{ .Values.athena.baseUrl | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.agentConfig.agentsMd }}
            - name: config
              mountPath: /app/AGENTS.md
              subPath: AGENTS.md
              readOnly: true
            {{- end }}
            {{- if .Values.agentConfig.subagentsYaml }}
            - name: config
              mountPath: /app/subagents.yaml
              subPath: subagents.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.skills.persistence.enabled }}
            - name: skills
              mountPath: /app/skills
            {{- end }}
      volumes:
        {{- if or .Values.agentConfig.agentsMd .Values.agentConfig.subagentsYaml }}
        - name: config
          configMap:
            name: athena-agent-config
        {{- end }}
        {{- if .Values.skills.persistence.enabled }}
        - name: skills
          persistentVolumeClaim:
            claimName: {{ include "athena.fullname" . }}-skills
        {{- end }}
