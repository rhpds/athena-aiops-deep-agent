{{- if .Values.skills.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "athena.fullname" . }}-skills
  labels:
    {{- include "athena.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.skills.persistence.size }}
{{- end }}
